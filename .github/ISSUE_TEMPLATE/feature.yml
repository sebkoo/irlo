name: Feature request
description: Propose an improvement or a new capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Irlo builds in stage order — everything beyond the current stage lives in `NEXT_STEPS.md`.
        Ideas past the current stage are welcome; they join the roadmap before any code lands.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or friction does this address, and who feels it?
      placeholder: "As a contributor / member / host, I can't … because …"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you would build. Sketch the contract or API shape if you can.
    validations:
      required: true
  - type: dropdown
    id: jd-competency
    attributes:
      label: JD-competency angle (optional)
      description: Which row of the CLAUDE.md JD-competency matrix would this strengthen, if any?
      options:
        - Node.js + TypeScript mastery
        - System design & architecture
        - Scaling backend systems in production, startup pace
        - Production StoreKit payments/subscriptions
        - Production Stripe payments/subscriptions (B2C)
        - Full SDLC, agile, CI/CD
        - Cross-functional & user-centric, data-driven
        - Enthusiasm for new AI tools
        - Not applicable / not sure
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you prefer this one.
    validations:
      required: false
