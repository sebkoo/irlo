# Single source of truth for the Xcode project — Irlo.xcodeproj is generated
# (make bootstrap) and gitignored. See ADR-0002.
name: Irlo
options:
  bundleIdPrefix: com.sebkoo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  Irlo:
    type: application
    platform: iOS
    sources:
      - Irlo/Sources
    info:
      path: Irlo/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
    scheme:
      gatherCoverageData: true
      testTargets:
        - IrloTests
        - IrloUITests

  IrloTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - IrloTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Irlo

  IrloUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - IrloUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Irlo
