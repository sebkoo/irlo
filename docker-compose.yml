# Local dev datastores (C19; ADR-0003 substrate for ADR-0009's tables).
# Credentials/ports mirror .env.example — server/test/dev-env.compose.test.ts
# enforces the sync, so change both together.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: irlo
      POSTGRES_PASSWORD: irlo
      POSTGRES_DB: irlo_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U irlo -d irlo_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
